name: Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  selenium-tests:
    name: Run Selenium Smoke Tests
    runs-on: ubuntu-latest

    timeout-minutes: 30

    defaults:
      run:
        working-directory: selenium-java

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('selenium-java/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Verify Java Version
        run: |
          java -version
          mvn -version

      - name: Clean Project
        run: mvn clean

      - name: Download Dependencies
        run: mvn dependency:resolve

      - name: Run Selenium Smoke Tests
        run: mvn test -Dgroups=smoke

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: selenium-java/target/surefire-reports/

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: selenium-java/target/test-output/

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            selenium-java/screenshots/
            selenium-java/target/screenshots/
            selenium-java/test-output/screenshots/
          if-no-files-found: ignore

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            selenium-java/logs/
            selenium-java/target/logs/
          if-no-files-found: ignore
